<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CounterOS — Agricultural Sales Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <span class="notif-panel-title">Notifications</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="markAllRead" style="font-size:11px;color:var(--green);cursor:pointer;">Mark all read</span>
      <button class="notif-panel-close" onclick="closeNotifPanel()">✕</button>
    </div>
  </div>
  <div class="notif-tabs">
    <button class="notif-tab active" onclick="switchNotifTab(this,'all')">All</button>
    <button class="notif-tab" onclick="switchNotifTab(this,'alerts')">Alerts</button>
    <button class="notif-tab" onclick="switchNotifTab(this,'updates')">Updates</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>
<div class="notif-overlay" id="notifOverlay" onclick="closeNotifPanel()"></div>

<!-- TOP NAV -->
<header class="topnav" id="topnav">
  <div class="topnav-left">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="#22c55e"/>
        <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">Counter<span class="logo-green">OS</span></span>
    </div>
    <button class="menu-btn" onclick="toggleSidebar()" title="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search for anything..." class="search-input"/>
    </div>
  </div>
  <div class="topnav-right">
    <div class="role-switcher" id="roleSwitcher"></div>
    <button class="icon-btn notif-btn" onclick="openNotifPanel()" title="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-badge" id="notifBadge">4</span>
    </button>
    <div class="user-pill" id="userPill">
      <div class="user-avatar" id="userAvatar">A</div>
      <div class="user-info">
        <span class="user-name" id="userName">Ankit Mehta</span>
        <span class="user-role" id="userRole">HQ Admin</span>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
</header>

<!-- LAYOUT -->
<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="org-card" id="orgCard">
      <div class="org-img" id="orgImg">GA</div>
      <div class="org-info" id="orgInfoWrap">
        <span class="org-name" id="orgName">Godrej Agrovet</span>
        <span class="org-sub" id="orgSub">HQ Dashboard</span>
      </div>
      <svg class="org-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer" id="sidebarFooter">
      <div class="help-card">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        <div class="help-text">
          <div class="help-title">Need Help?</div>
          <div class="help-sub">Contact our support team</div>
        </div>
      </div>
      <button class="contact-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.1a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 15l.19 1.92z"/></svg>
        <span class="btn-label">Contact Support</span>
      </button>
      <div class="sidebar-links">
        <a href="#" onclick="navigate('settings');return false;" class="sidebar-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          <span class="btn-label">Settings</span>
        </a>
        <a href="#" class="sidebar-link logout">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span class="btn-label">Log Out</span>
        </a>
      </div>
    </div>
    <!-- Collapsed tooltip stub (icons only) -->
    <div class="sidebar-collapsed-hint" id="collapsedHint" title="Expand sidebar"></div>
  </aside>

  <!-- MAIN -->
  <main class="main-content" id="mainContent"></main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
